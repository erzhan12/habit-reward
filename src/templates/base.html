{% load django_vite %}{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="csp-nonce" content="{{ csp_nonce }}">
    <title>Habit Reward</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'icons/icon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'icons/icon-16x16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'icons/icon-180x180.png' %}">
    <link rel="manifest" href="{% static 'site.webmanifest' %}">
    <meta name="theme-color" content="#1a1a2e">
    {% vite_hmr_client %}
    {% vite_asset 'src/main.js' %}
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen antialiased">
    {% block inertia %}{% endblock %}
</body>
</html>
