name: Check Pattern Sync

on:
  pull_request:
    paths:
      - "src/web/utils/validation.py"
      - "frontend/src/pages/Login.vue"

jobs:
  pattern-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify TELEGRAM_USERNAME regex patterns match
        run: |
          # Extract the Python pattern (strip anchors for comparison).
          py_pattern=$(grep -oP "TELEGRAM_USERNAME_PATTERN\s*=\s*r\"\\^\K[^$]+" src/web/utils/validation.py)
          # Extract the JS pattern (strip anchors for comparison).
          js_pattern=$(grep -oP "TELEGRAM_USERNAME_RE\s*=\s*/\\^\K[^$]+" frontend/src/pages/Login.vue)

          echo "Python pattern body: $py_pattern"
          echo "JS pattern body:     $js_pattern"

          if [ "$py_pattern" != "$js_pattern" ]; then
            echo "::error::TELEGRAM_USERNAME patterns are out of sync!"
            echo "  Python (src/web/utils/validation.py): ^${py_pattern}\$"
            echo "  JS     (frontend/src/pages/Login.vue): ^${js_pattern}\$"
            exit 1
          fi
          echo "Patterns match."
