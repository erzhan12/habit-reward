name: Build and Deploy (Caddy)

on:
  push:
    branches:
      - main
      - simple-caddy-deploy  # Also deploy from feature branch for testing
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv pip install --system ".[dev]"

      - name: Run Django migrations
        run: python manage.py migrate --noinput
        env:
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: sqlite:///test.db
          TELEGRAM_BOT_TOKEN: test-token-not-real
          DEBUG: "True"

      - name: Run tests
        run: pytest tests/ -v -m "not local_only"
        env:
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: sqlite:///test.db
          TELEGRAM_BOT_TOKEN: test-token-not-real
          DEBUG: "True"
          CI: "true"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend login tests
        working-directory: frontend
        # Pin tool versions to keep CI deterministic even when executed via npx.
        run: >
          npx --yes
          --package vitest@3.0.7
          --package @vue/test-utils@2.4.6
          --package jsdom@26.0.0
          vitest run tests/Login.spec.js --environment jsdom

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployment/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/simple-caddy-deploy'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment directory
        run: |
          ssh -o ServerAliveInterval=15 -o ServerAliveCountMax=10 ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }} << 'SETUP'
            mkdir -p ${{ secrets.DEPLOY_PATH }}
            mkdir -p ${{ secrets.DEPLOY_PATH }}/data
            mkdir -p ${{ secrets.DEPLOY_PATH }}/staticfiles
          SETUP

      - name: Copy deployment files to server
        run: |
          tar czf - -C deployment . | ssh ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && tar xzf -"

      - name: Create .env file from secrets
        run: |
          cat > .env << EOF
          # Django Configuration
          SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG=False
          ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
          CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_TRUSTED_ORIGINS }}

          # Database (SQLite for simplicity)
          DATABASE_URL=sqlite:////app/data/db.sqlite3

          # Telegram Bot
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_URL=${{ secrets.TELEGRAM_WEBHOOK_URL }}

          # Superuser (created on first run if not exists)
          DJANGO_SUPERUSER_USERNAME=${{ secrets.DJANGO_SUPERUSER_USERNAME }}
          DJANGO_SUPERUSER_EMAIL=${{ secrets.DJANGO_SUPERUSER_EMAIL }}
          DJANGO_SUPERUSER_PASSWORD=${{ secrets.DJANGO_SUPERUSER_PASSWORD }}

          # Docker Configuration
          DOCKER_REGISTRY=${{ env.REGISTRY }}
          DOCKER_IMAGE_NAME=${{ env.IMAGE_NAME }}
          IMAGE_TAG=latest

          # Domain
          DOMAIN=habitreward.org

          # Optional: LLM/AI Configuration
          LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}
          LLM_MODEL=${{ secrets.LLM_MODEL }}
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}

          # Application Settings
          LOG_LEVEL=INFO
          SUPPORTED_LANGUAGES=en,ru,kk
          STREAK_REDUCTION_RATE=2.0
          MIN_NO_REWARD_PROBABILITY=10.0
          EOF

      - name: Copy .env file to server
        run: |
          scp .env ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/.env

      - name: Deploy containers with Caddy
        run: |
          ssh -o ServerAliveInterval=15 -o ServerAliveCountMax=10 ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }} << 'DEPLOY'
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}

            # Login to GitHub Container Registry — retry on transient network failures
            login_attempts=0
            until echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin; do
              login_attempts=$((login_attempts + 1))
              if [ "$login_attempts" -ge 3 ]; then
                echo "ERROR: docker login ghcr.io failed 3 times"; exit 1
              fi
              echo "docker login attempt $login_attempts failed; retrying in 5s..."
              sleep 5
            done

            # Pull FIRST — only tear down running containers if the new image is in hand.
            # Avoids tearing down prod when ghcr.io is unreachable. Retry on
            # transient network failures (defense-in-depth above docker's
            # internal layer retries).
            pull_attempts=0
            until docker-compose --env-file .env -f docker/docker-compose.yml pull web; do
              pull_attempts=$((pull_attempts + 1))
              if [ "$pull_attempts" -ge 3 ]; then
                echo "ERROR: docker-compose pull web failed 3 times"; exit 1
              fi
              echo "pull attempt $pull_attempts failed; retrying in 5s..."
              sleep 5
            done

            # Stop existing containers gracefully
            docker-compose --env-file .env -f docker/docker-compose.yml down --timeout 30

            # Start new containers
            docker-compose --env-file .env -f docker/docker-compose.yml up -d

            # Wait for services to be ready
            echo "Waiting for containers to start..."
            sleep 15

            # Show container status
            echo "Container Status:"
            docker-compose --env-file .env -f docker/docker-compose.yml ps

            # Fail loudly if either container isn't actually running. The HTTPS
            # health check would catch this in ~50s, but checking here makes the
            # failure faster and easier to diagnose.
            web_state=$(docker inspect habit_reward_web --format='{{.State.Status}}' 2>/dev/null || echo "missing")
            if [ "$web_state" != "running" ]; then
              echo "ERROR: habit_reward_web is not running (state=$web_state)"
              docker-compose --env-file .env -f docker/docker-compose.yml logs --tail=50 web || true
              exit 1
            fi
            caddy_state=$(docker inspect habit_reward_caddy --format='{{.State.Status}}' 2>/dev/null || echo "missing")
            if [ "$caddy_state" != "running" ]; then
              echo "ERROR: habit_reward_caddy is not running (state=$caddy_state)"
              docker-compose --env-file .env -f docker/docker-compose.yml logs --tail=50 caddy || true
              exit 1
            fi
          DEPLOY

      - name: Verify deployment health
        run: |
          ssh -o ServerAliveInterval=15 -o ServerAliveCountMax=10 ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }} << 'VERIFY'
            set -uo pipefail
            cd ${{ secrets.DEPLOY_PATH }}

            echo "Checking container logs:"
            docker-compose --env-file .env -f docker/docker-compose.yml logs --tail=30 web
            docker-compose --env-file .env -f docker/docker-compose.yml logs --tail=30 caddy

            echo "Checking container health:"
            docker inspect habit_reward_web --format='{{.State.Health.Status}}' || echo "Health check not available yet"
          VERIFY

  health-check:
    name: Health Check (HTTPS)
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/simple-caddy-deploy'

    steps:
      - name: Wait for services to stabilize
        run: sleep 30

      # Note: this strict check will fail on first deployment if SSL cert
      # provisioning takes longer than ~80s (30s stabilization + 5×10s retries).
      # That is intentional — prefer failing loudly over silent success.
      - name: Check HTTPS endpoint
        run: |
          set -euo pipefail
          echo "Testing HTTPS endpoint..."
          STATUS=""
          for attempt in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://habitreward.org/admin/login/ || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "✅ HTTPS is working! (HTTP $STATUS, attempt $attempt)"
              exit 0
            fi
            echo "Attempt $attempt: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "❌ HTTPS health check failed after 5 attempts (last status: $STATUS)"
          exit 1

      - name: Check SSL certificate
        run: |
          echo "Checking SSL certificate..."
          echo | openssl s_client -servername habitreward.org -connect habitreward.org:443 2>/dev/null | \
            openssl x509 -noout -dates || echo "SSL cert not ready yet (will be provisioned automatically)"
